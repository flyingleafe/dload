name: Checks

on:
  workflow_call:

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    env:
      UV_CACHE_DIR: /tmp/.uv-cache
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@v3

      - name: Restore uv cache
        uses: actions/cache@v4
        with:
          path: /tmp/.uv-cache
          # no prune before save: the torch CPU wheel must stay cached, or
          # every run re-downloads it from the flaky pytorch index
          key: uv-v2-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-v2-${{ runner.os }}-

      - name: ruff + ruff-format
        run: nix flake check -L

      - name: uv sync
        # the devshell shellHook also syncs, but non-fatally — do it as an
        # explicit step so a failed download fails HERE, not as 89 bogus
        # missing-import errors in basedpyright. Retried because the
        # pytorch index CDN intermittently fails TLS from GitHub runners;
        # after one success the torch wheel lives in the uv cache.
        run: |
          for i in 1 2 3; do
            nix develop --command uv sync && exit 0
            echo "uv sync failed (attempt $i), retrying in 30s..."
            sleep 30
          done
          exit 1

      - name: basedpyright
        run: nix develop --command basedpyright

      - name: Tests
        # integration tests need live R2 credentials; CI runs the fast suite
        run: nix develop --command uv run pytest -q -m "not integration"
